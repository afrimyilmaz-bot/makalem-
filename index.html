<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>mak'alem v14.0 - Afrim Usta</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; --accent: #3498db; --border: #dcdde1; --danger: #e84118; --success: #2ecc71; --warning: #f1c40f; }
        body.dark { --bg: #1e272e; --card: #2f3640; --text: #f5f6fa; --border: #485460; --accent: #00a8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 80px; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        body.dark #loader { background: rgba(30, 39, 46, 0.9); }
        .spinner { width: 85px; height: 85px; border: 5px solid var(--border); border-top: 5px solid var(--accent); border-right: 5px solid var(--success); border-bottom: 5px solid var(--warning); border-radius: 50%; animation: spin 1s linear infinite; position: relative; }
        .pen-icon { position: absolute; font-size: 35px; top: 18px; left: 22px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.8rem; font-weight: bold; color: var(--accent); cursor: pointer; }
        .announcement { background: var(--warning); color: #000; padding: 10px; text-align: center; font-size: 0.85rem; font-weight: bold; border-radius: 0 0 15px 15px; margin: 0 10px 10px 10px; }
        .card { background: var(--card); margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); border: 1px solid var(--border); position: relative; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 40px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; border-top: 1px solid var(--border); height: 72px; z-index: 1000; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; opacity: 0.5; }
        .tab.active { opacity: 1; color: var(--accent); border-top: 4px solid var(--accent); }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin: 10px auto; display: block; background: #eee; }
        .feed-img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 15px; margin: 10px 0; }
        .badge { font-size: 0.65rem; padding: 3px 8px; border-radius: 50px; background: var(--warning); color: #000; margin-left: 5px; font-weight: bold; }
        .full-read { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 3000; padding: 20px; overflow-y: auto; display: none; }
        .full-read.active { display: block; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-card { background: var(--card); width: 95%; max-width: 500px; padding: 20px; border-radius: 24px; max-height: 90vh; overflow-y: auto; }
        .user-scroll-box { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; padding: 10px; background: var(--bg); }
        .del-icon { color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 5px; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"><div class="pen-icon">✒️</div></div><p style="margin-top:15px; font-weight:bold;">Usta makaleyi işliyor...</p></div>
    <div id="app"></div>
    <div id="fullReader" class="full-read"></div>
    <div id="modalContainer"></div>

<script>
let users = JSON.parse(localStorage.getItem("m_u") || '[{"id":1, "name":"Afrim", "email":"afrimyilmaz@gmail.com", "pass":"2663", "rq":"ilk kedim", "ra":"çita", "bio":"Uygulama Yöneticisi", "pic":"", "badge":"Kurucu", "muta":[], "follows":[]}]');
let articles = JSON.parse(localStorage.getItem("m_a") || "[]");
let reports = JSON.parse(localStorage.getItem("m_r") || "[]");
let currU = localStorage.getItem("m_c") ? JSON.parse(localStorage.getItem("m_c")) : null;
let globalAnn = localStorage.getItem("m_ann") || "📢 mak'alem Uygulamasına Hoş Geldiniz!";
let tab = "feed", dark = localStorage.getItem("m_d") === "true", isReg = false, guestMode = false, tmpImg = null, searchTerm = "";

const save = () => {
    localStorage.setItem("m_u", JSON.stringify(users));
    localStorage.setItem("m_a", JSON.stringify(articles));
    localStorage.setItem("m_r", JSON.stringify(reports));
    localStorage.setItem("m_c", currU ? JSON.stringify(currU) : "");
    localStorage.setItem("m_ann", globalAnn);
    localStorage.setItem("m_d", dark);
};

const esc = (s) => String(s || "").replace(/[&<>]/g, m => ({'&':'&','<':'<','>':'>'}[m]));
const isAdmin = () => currU && currU.email === "afrimyilmaz@gmail.com";

function render() {
    if(currU && !guestMode) { 
        const fresh = users.find(x => x.id === currU.id); 
        if (fresh) currU = fresh; 
    }
    document.body.className = dark ? "dark" : "";
    const app = document.getElementById("app");
    
    if (!currU && !guestMode) { app.innerHTML = viewAuth(); return; }

    let html = `<div class="header"><div class="brand" onclick="tab='feed';render()">mak'<span>alem</span></div></div>
                <div class="announcement">${esc(globalAnn)}</div>`;
    
    const nav = `<div class="tab-bar">
        <div class="tab ${tab==='feed'?'active':''}" onclick="tab='feed';render()">🏠<br>Akış</div>
        ${!guestMode ? `
            <div class="tab ${tab==='add'?'active':''}" onclick="tab='add';render()">➕<br>Paylaş</div>
            ${isAdmin() ? `<div class="tab ${tab==='admin'?'active':''}" onclick="tab='admin';render()">⚙️<br>Admin</div>` : ''}
            <div class="tab ${tab==='prof'?'active':''}" onclick="tab='prof';render()">👤<br>Profil</div>
        ` : `<div class="tab" onclick="location.reload()">🔑<br>Giriş</div>`}
    </div>`;

    if (tab === "feed") {
        html += `<div class="card"><input type="text" placeholder="🔍 Makale veya yazar ara..." oninput="searchTerm=this.value;performSearch()" value="${esc(searchTerm)}"></div><div id="feedList"></div>`;
    } else if (tab === "add") html += viewAdd();
    else if (tab === "admin") html += viewAdmin();
    else if (tab === "prof") html += viewProfile(currU ? currU.id : null);

    html += `<div style="text-align:center; font-size:0.75rem; padding:20px; opacity:0.7; margin-bottom:80px; line-height:1.4">Bu uygulamanın Hakkı saklıdır.<br>Tüm hakları <b>Abdurrahman Yıldız</b>'a aittir.</div>`;
    app.innerHTML = html + nav;
    if (tab === "feed") performSearch();
}

function viewAuth() {
    return `<div class="card" style="text-align:center; margin-top:40px">
        <div class="brand" style="font-size:2.5rem">mak'<span>alem</span></div>
        ${!isReg ? `
            <h3>Giriş Yap</h3><input id="le" placeholder="E-posta"><input id="lp" type="password" placeholder="Şifre">
            <button onclick="login()">Giriş</button>
            <p onclick="forgotPass()" style="margin-top:15px; color:var(--accent); cursor:pointer; font-size:0.9rem; text-decoration:underline">Şifremi Unuttum</p>
            <button onclick="guestMode=true;tab='feed';render()" style="background:var(--text); margin-top:20px">🔍 Üye Olmadan Bak</button>
            <p style="margin-top:20px">Hesabın yok mu? <span onclick="isReg=true;render()" style="color:var(--accent); cursor:pointer">Kayıt Ol</span></p>
        ` : `
            <h3>Kayıt Ol</h3><input id="rn" placeholder="Ad Soyad"><input id="re" placeholder="E-posta"><input id="rp" type="password" placeholder="Şifre">
            <input id="rq" placeholder="Güvenlik Sorusu (Örn: ilk kedim)"><input id="ra" placeholder="Cevabı">
            <button onclick="register()" style="background:var(--success)">Kaydı Tamamla</button>
            <p onclick="isReg=false;render()" style="margin-top:15px; cursor:pointer">Geri Dön</p>
        `}</div>`;
}

function performSearch() {
    const list = document.getElementById('feedList'); if(!list) return;
    const term = searchTerm.toLowerCase().trim();
    const filtered = articles.filter(a => (a.title.toLowerCase().includes(term) || a.content.toLowerCase().includes(term) || a.uName.toLowerCase().includes(term)));
    list.innerHTML = filtered.map(a => renderCard(a)).join('') || '<p style="text-align:center; padding:20px">Yazı yok usta.</p>';
}

function renderCard(a) {
    const u = users.find(x => x.id === a.uid);
    const likeCount = (a.likes || []).length;
    const dateStr = a.date ? new Date(a.date).toLocaleDateString('tr-TR') : 'Bilinmiyor';
    return `<div class="card" onclick="openFull(${a.id})">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
            <img src="${u?.pic || 'https://via.placeholder.com/40'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover" onclick="event.stopPropagation(); showUserModal(${a.uid})">
            <div onclick="event.stopPropagation(); showUserModal(${a.uid})"><b>${esc(a.uName)}</b> ${u?.badge ? `<span class="badge">${u.badge}</span>`:''}</div>
            <div style="flex:1"></div>
            <small style="opacity:0.6">${dateStr}</small>
            ${!guestMode ? `<span onclick="event.stopPropagation(); reportArticle(${a.id})" style="cursor:pointer; margin-left:10px">🚩</span>` : ''}
        </div>
        <h3 style="color:var(--accent)">${esc(a.title)}</h3>
        ${a.img ? `<img src="${a.img}" class="feed-img">` : ''}
        <p style="font-size:0.85rem">${esc(a.content.substring(0,80))}...</p>
        <div style="margin-top:10px; font-size:0.8rem; display:flex; gap:15px">
             <span onclick="event.stopPropagation(); likeArticle(${a.id})" style="cursor:pointer">❤️ ${likeCount}</span>
             <span onclick="event.stopPropagation(); readAloud('${esc(a.content.replace(/'/g, ''))}')" style="cursor:pointer">🔊 Dinle</span>
        </div>
    </div>`;
}

function viewProfile(userId) {
    if(!userId && guestMode) return `<div class="card" style="text-align:center"><h3>Ziyaretçi Modu</h3><p>Profil için üye olmalısın usta.</p></div>`;
    const u = users.find(x => x.id === userId); if(!u) return "";
    const isMe = currU && currU.id === userId;
    const userArticles = articles.filter(a => a.uid === u.id);
    return `<div class="card" style="text-align:center">
        ${isMe ? `<button onclick="dark=!dark;save();render()" style="background:var(--text); margin-bottom:15px">${dark?'☀️ Aydınlık':'🌙 Karanlık'}</button>` : ''}
        <img src="${u.pic||'https://via.placeholder.com/100'}" class="profile-img">
        ${isMe ? `<button onclick="pickImg(r=>{currU.pic=r; saveUsers(); render()})" style="width:auto; padding:5px 10px; font-size:0.7rem">Fotoğraf Ekle</button>` : ''}
        <h2>${esc(u.name)} ${u.badge ? `<span class="badge">${u.badge}</span>`:''}</h2>
        <p style="margin:10px 0"><b>Hakkında:</b> ${esc(u.bio || 'Bilgi yok.')}</p>
        ${isMe ? `<button onclick="let b=prompt('Hakkında:', currU.bio||''); if(b!==null){currU.bio=b; saveUsers(); render();}" style="width:auto; padding:5px 10px; font-size:0.7rem">Düzenle</button>` : ''}
        <div style="margin:15px 0">
            ${!isMe && !guestMode ? `<button onclick="toggleFollow(${u.id})" style="width:auto; padding:8px 20px; background:var(--accent)">${(currU.follows && currU.follows.includes(u.id)) ? '✅ Takip Ediliyor' : '👤 Takip Et'}</button>` : ''}
        </div>
        <hr style="margin:15px 0">
        <h4>Kütüphanesi (${userArticles.length})</h4>
        <div class="user-scroll-box">
            ${userArticles.map(a => `
                <div style="padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center">
                    <span onclick="openFull(${a.id})" style="cursor:pointer; flex:1; text-align:left">${esc(a.title)}</span>
                    ${isMe ? `<span class="del-icon" onclick="delA(${a.id});render()">🗑️</span>` : ''}
                </div>
            `).join('') || 'Yazı yok.'}
        </div>
        ${isMe ? `<button onclick="logout()" style="background:var(--danger); margin-top:15px">Çıkış Yap</button>` : `<button onclick="closeM()" style="margin-top:15px">Kapat</button>`}
    </div>`;
}

function viewAdmin() {
    return `<div class="card"><h2>⚙️ Admin Paneli</h2>
    <input id="annI" value="${esc(globalAnn)}" placeholder="Duyuru..."><button onclick="globalAnn=document.getElementById('annI').value;save();render()">Yayınla</button>
    <hr style="margin:20px 0">
    <h3>👤 Yazarlar</h3>
    <div class="user-scroll-box">
        ${users.map(u => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid var(--border); padding:5px">
            <span onclick="showUserModal(${u.id})" style="cursor:pointer">${esc(u.name)}</span>
            <div>
                <button onclick="giveBadge(${u.id})" style="width:auto; padding:4px 8px; font-size:0.6rem; background:var(--warning); color:#000">Rozet</button>
                <button onclick="warnUser(${u.id})" style="width:auto; padding:4px 8px; font-size:0.6rem; background:var(--accent)">Uyar</button>
                ${u.id!==1?`<button onclick="delU(${u.id})" style="width:auto; padding:4px 8px; font-size:0.6rem; background:var(--danger)">Sil</button>`:''}
            </div>
        </div>`).join('')}
    </div>
    <hr style="margin:20px 0">
    <h3>🚩 Şikayetler (${reports.length})</h3>
    ${reports.map(r => `<div style="background:var(--bg); padding:10px; border-radius:10px; margin-bottom:10px">
        <b>${esc(r.title)}</b><br><small>${esc(r.reason)}</small><br>
        <button onclick="openFull(${r.aid})" style="width:auto; padding:5px 10px; font-size:0.7rem">Makaleyi Oku</button>
        <button onclick="delA(${r.aid}); delReport(${r.id}); render()" style="width:auto; padding:5px 10px; font-size:0.7rem; background:var(--danger)">Makaleyi Sil 🗑️</button>
        <button onclick="delReport(${r.id}); render()" style="width:auto; padding:5px 10px; font-size:0.7rem">Şikayeti Kaldır</button>
    </div>`).join('') || 'Şikayet yok.'}</div>`;
}

function publishWithAnim() {
    let t=document.getElementById("at").value, c=document.getElementById("ac").value;
    if(!t||!c) return alert("Usta başlık ve içerik boş kalmaz!");
    document.getElementById("loader").style.display = "flex";
    setTimeout(() => {
        articles.unshift({ id:Date.now(), uid:currU.id, uName:currU.name, title:t, content:c, img:tmpImg, likes:[], date:Date.now() });
        tmpImg=null; save(); document.getElementById("loader").style.display="none"; tab="feed"; render();
    }, 1500);
}

function login() {
    let e=document.getElementById("le").value.trim().toLowerCase(), p=document.getElementById("lp").value.trim();
    let u=users.find(x=>x.email.toLowerCase()===e && x.pass===p);
    if(u){currU=u; guestMode=false; save(); render();} else alert("Usta giriş başarısız!");
}

function register() {
    let n=document.getElementById("rn").value, e=document.getElementById("re").value.trim().toLowerCase(), p=document.getElementById("rp").value.trim(), q=document.getElementById("rq").value, a=document.getElementById("ra").value;
    if(n&&e&&p&&q&&a){ users.push({id:Date.now(), name:n, email:e, pass:p, rq:q, ra:a, muta:[], follows:[], pic:'', bio:''}); alert("Hoş geldin! Giriş yapabilirsin."); isReg=false; render(); }
}

function delA(id) { if(confirm('Bu makale kökten gitsin mi usta?')){ articles=articles.filter(a=>a.id!==id); save(); render(); }}
function delU(id) { if(confirm('Yazarı ve tüm verilerini siliyorum?')){ users=users.filter(u=>u.id!==id); articles=articles.filter(a=>a.uid!==id); save(); render(); }}
function delReport(id) { reports=reports.filter(r=>r.id!==id); save(); }

function forgotPass() {
    let e=prompt("Kayıtlı E-posta:"); if(!e) return;
    let u=users.find(x=>x.email.toLowerCase()===e.trim().toLowerCase());
    if(!u) return alert("Yazar bulunamadı!");
    let a=prompt(`Güvenlik Sorusu: ${u.rq}\nCevap?`);
    if(a && a.trim().toLowerCase()===u.ra.toLowerCase()) alert(`Şifreniz: ${u.pass}`); else if(a) alert("Yanlış cevap usta!");
}

function pickImg(cb) { 
    const i=document.createElement('input'); i.type='file'; i.accept='image/*'; 
    i.onchange=e=>{
        const f=e.target.files[0], r=new FileReader();
        r.onload=re=>{
            const img=new Image();
            img.onload=()=>{
                const cvs=document.createElement('canvas'); const m=600; let w=img.width, h=img.height;
                if(w>m){h*=m/w; w=m;} cvs.width=w; cvs.height=h;
                cvs.getContext('2d').drawImage(img,0,0,w,h); cb(cvs.toDataURL('image/jpeg',0.7));
            };
            img.src=re.target.result;
        }; r.readAsDataURL(f);
    }; i.click();
}

function viewAdd() { return `<div class="card"><h2>✍️ Yeni Makale</h2><input id="at" placeholder="Başlık"><button onclick="pickImg(r=>{tmpImg=r;render()})">🖼️ Fotoğraf Ekle</button>${tmpImg?`<img src="${tmpImg}" class="feed-img">`:''}<textarea id="ac" rows="10" placeholder="Yaz usta, kalem sende..."></textarea><button onclick="publishWithAnim()" style="background:var(--success)">Yayınla</button></div>`; }
function openFull(id) { const a=articles.find(x=>x.id===id); if(!a) return; const r=document.getElementById("fullReader"); r.innerHTML=`<button onclick="closeFull()" style="background:var(--accent); width:auto; padding:8px 20px; margin-bottom:15px">Geri Dön</button><h1>${esc(a.title)}</h1><p><small>${esc(a.uName)} yazdı</small></p>${a.img?`<img src="${a.img}" style="width:100%; border-radius:20px; margin:15px 0">`:''}<p style="white-space:pre-wrap; font-size:1.1rem; line-height:1.7">${esc(a.content)}</p>`; r.classList.add("active"); }
function closeFull() { window.speechSynthesis.cancel(); document.getElementById("fullReader").classList.remove("active"); }
function showUserModal(id) { document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeM()"><div class="modal-card">${viewProfile(id)}</div></div>`; }
function closeM() { document.getElementById('modalContainer').innerHTML=''; }
function likeArticle(aid) { if(guestMode) return alert("Beğenmek için üye olmalısın."); let a=articles.find(x=>x.id===aid); if(!a.likes) a.likes=[]; if(a.likes.includes(currU.id)) a.likes=a.likes.filter(id=>id!==currU.id); else a.likes.push(currU.id); save(); render(); }
function reportArticle(aid) { if(guestMode) return alert("Şikayet için üye olmalısın."); let r=prompt("Şikayet nedeni?"); if(r) { reports.push({id:Date.now(), aid, reporter:currU.name, reason:r, title:articles.find(x=>x.id===aid)?.title}); save(); alert("Bildirildi."); } }
function toggleFollow(uid) { if(!currU.follows) currU.follows=[]; if(currU.follows.includes(uid)) currU.follows=currU.follows.filter(id=>id!==uid); else currU.follows.push(uid); saveUsers(); render(); }
function giveBadge(uid) { let b=prompt("Rozet ver:"); users=users.map(u=>u.id===uid?({...u, badge:b}):u); save(); render(); }
function warnUser(uid) { alert(users.find(u=>u.id===uid).name + " uyarıldı."); }
function readAloud(text) { 
    if ('speechSynthesis' in window) { 
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text); 
        msg.lang = 'tr-TR'; 
        window.speechSynthesis.speak(msg); 
    } else {
        alert("Usta senin cihazda sesli okuma özelliği kapalı.");
    }
}

function pickImg(cb) { 
    const i=document.createElement('input'); 
    i.type='file'; 
    i.accept='image/*'; 
    i.onchange=e=>{
        const f=e.target.files[0], r=new FileReader();
        r.onload=re=>{
            const img=new Image();
            img.onload=()=>{
                const cvs=document.createElement('canvas'); 
                const m=600; 
                let w=img.width, h=img.height;
                if(w>m){h*=m/w; w=m;} 
                cvs.width=w; cvs.height=h;
                cvs.getContext('2d').drawImage(img,0,0,w,h); 
                cb(cvs.toDataURL('image/jpeg',0.7));
            };
            img.src=re.target.result;
        }; r.readAsDataURL(f);
    }; 
    i.click();
}

function viewAdmin() {
    return `<div class="card"><h2>⚙️ Admin Paneli</h2>
    <input id="annI" value="${esc(globalAnn)}" placeholder="Duyuru..."><button onclick="globalAnn=document.getElementById('annI').value;save();render()">Yayınla</button>
    <hr style="margin:20px 0">
    <h3>👤 Yazarlar</h3>
    <div class="user-scroll-box">
        ${users.map(u => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid var(--border); padding:5px">
            <span onclick="showUserModal(${u.id})" style="cursor:pointer">${esc(u.name)}</span>
            <div>
                <button onclick="giveBadge(${u.id})" style="width:auto; padding:4px 8px; font-size:0.6rem; background:var(--warning); color:#000">Rozet</button>
                <button onclick="warnUser(${u.id})" style="width:auto; padding:4px 8px; font-size:0.6rem; background:var(--accent)">Uyar</button>
                ${u.id!==1?`<button onclick="delU(${u.id})" style="width:auto; padding:4px 8px; font-size:0.6rem; background:var(--danger)">Sil</button>`:''}
            </div>
        </div>`).join('')}
    </div>
    <hr style="margin:20px 0">
    <h3>🚩 Şikayetler (${reports.length})</h3>
    ${reports.map(r => `<div style="background:var(--bg); padding:10px; border-radius:10px; margin-bottom:10px">
        <b>${esc(r.title)}</b><br><small>${esc(r.reason)}</small><br>
        <button onclick="openFull(${r.aid})" style="width:auto; padding:5px 10px; font-size:0.7rem">Makaleyi Oku</button>
        <button onclick="delA(${r.aid}); delReport(${r.id}); render()" style="width:auto; padding:5px 10px; font-size:0.7rem; background:var(--danger)">Makaleyi Sil 🗑️</button>
        <button onclick="delReport(${r.id}); render()" style="width:auto; padding:5px 10px; font-size:0.7rem">Şikayeti Kaldır</button>
    </div>`).join('') || 'Şikayet yok.'}</div>`;
}

function publishWithAnim() {
    let t=document.getElementById("at").value, c=document.getElementById("ac").value;
    if(!t||!c) return alert("Usta başlık ve içerik boş kalmaz!");
    // Renkli kalem efekti başlıyor
    document.getElementById("loader").style.display = "flex";
    setTimeout(() => {
        articles.unshift({ id:Date.now(), uid:currU.id, uName:currU.name, title:t, content:c, img:tmpImg, likes:[], date:Date.now() });
        tmpImg=null; 
        save(); 
        document.getElementById("loader").style.display="none"; // Efekt bitti
        tab="feed"; 
        render();
    }, 1500);
}

function saveUsers() { users=users.map(u=>u.id===currU.id?currU:u); save(); }
function delReport(id) { reports=reports.filter(r=>r.id!==id); save(); }

function logout() { 
    currU = null; 
    guestMode = false; 
    save(); 
    render(); 
}

window.onload = render;
</script>
</body>
</html>
